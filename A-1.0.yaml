# =====================================================
# 策略组（Proxy Groups）
# =====================================================

# 策略组通用属性
group_common:
  group_common_select: &group_common_select
    type: select
    interval: 600
    timeout: 3000
    max-failed-times: 3
    empty-fallback: REJECT
    url: 'https://g.cn/generate_204'
    lazy: true

  group_common_auto: &group_common_auto
    type: url-test
    interval: 600
    timeout: 3000
    max-failed-times: 3
    empty-fallback: REJECT
    url: 'https://g.cn/generate_204'
    lazy: true
    tolerance: 50
    include-all: true
    exclude-type: 'DIRECT'
    icon: 'https://gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png'
    hidden: true

  group_common_load: &group_common_load
    type: load-balance
    interval: 600
    timeout: 3000
    max-failed-times: 3
    empty-fallback: REJECT
    url: 'https://g.cn/generate_204'
    lazy: true
    strategy: 'sticky-sessions'
    include-all: true
    exclude-type: 'DIRECT'
    icon: 'https://gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Round_Robin.png'
    hidden: true

# 通用代理节点组合
proxies_common:
  proxies_default: &proxies_default
    proxies: ['默认代理', '自动选择', '负载均衡', '香港', '日本', '美国', '新加坡', '台湾省', '其他节点']

  proxies_direct: &proxies_direct
    proxies: ['默认代理', '自动选择', '负载均衡', '直连', '香港', '日本', '美国', '新加坡', '台湾省', '其他节点']

  proxies_reject: &proxies_reject
    proxies: ['REJECT', 'REJECT-DROP', 'PASS']

# 地区过滤器（正则）
group_filter:
  HK_filter: &HK_filter { filter: '🇭🇰|港|HK|[Hh]ong\s*[Kk]ong' }
  JP_filter: &JP_filter { filter: '🇯🇵|日本|JP|[Jj]apan' }
  US_filter: &US_filter { filter: '🇺🇸|美|US|[Aa]merica|[Uu]nited\s*[Ss]tates' }
  SG_filter: &SG_filter { filter: '🇸🇬|新加坡|狮城|SG|[Ss]ingapore' }
  TW_filter: &TW_filter { filter: '🇹🇼|台湾|TW|[Tt]aiwan' }

  exclude_filter: &exclude_filter
    exclude-filter: '港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|台湾|TW|🇹🇼'
    exclude-type: 'DIRECT'

proxy-groups:

  # ------- 顶层策略组 -------
  - name: '默认代理'
    <<: *group_common_select
    proxies: ['日本', '香港', '美国', '新加坡', '台湾省', '自动选择', '负载均衡', '其他节点']
    icon: 'https://gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png'

  - name: '自动选择'
    <<: *group_common_auto

  - name: '负载均衡'
    <<: *group_common_load

  # ------- 分应用策略组 -------
  - name: 'AI'
    <<: [*group_common_select, *proxies_default]
    default-selected: '美国'
    icon: 'https://gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png'

  - name: 'Media'
    <<: [*group_common_select, *proxies_default]
    default-selected: '日本'
    icon: 'https://gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ForeignMedia.png'

  - name: 'FCM'
