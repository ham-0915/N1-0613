name: N1-ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      version:
        description: '选择编译版本'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '24.10'
          - '25.12'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: '24.10'
            branch: 'openwrt-24.10'
            kernel: '6.6.y'
            keep: 15
          - tag: '25.12'
            branch: 'openwrt-25.12'
            kernel: '6.18.y'
            keep: 15

    if: github.event.inputs.version == 'all' || github.event.inputs.version == matrix.tag || github.event.inputs.version == ''

    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
    env:
      TAG: ${{ matrix.tag }}
      BRANCH: ${{ matrix.branch }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: 准备编译空间
      run: sudo mkdir -p /workdir && sudo chown "$USER:$GROUPS" /workdir

    - name: 最大化磁盘空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 10240
        swap-size-mb: 1024
        build-mount-path: /workdir
        overprovision-lvm: 'true'
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: 安装编译依赖
      run: |
        echo "::group::安装编译依赖"
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
          gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
          libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
          libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
          libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd libfuse-dev
        sudo timedatectl set-timezone Asia/Shanghai
        echo "::endgroup::"

    - name: 克隆源码
      working-directory: /workdir
      run: |
        echo "::group::克隆源码 ($BRANCH)"
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt -b "$BRANCH" openwrt
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
        echo "::endgroup::"

    - name: 恢复 Ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ env.TAG }}-${{ hashFiles('N1/n1.config') }}
        restore-keys: ${{ runner.os }}-ccache-${{ env.TAG }}-

    - name: 加载 Feeds
      run: |
        echo "::group::生成 feeds.conf.default"
        printf '%s\n' \
          "src-git packages https://github.com/immortalwrt/packages.git;$BRANCH" \
          "src-git luci https://github.com/immortalwrt/luci.git;$BRANCH" \
          "src-git routing https://github.com/openwrt/routing.git;$BRANCH" \
          "src-git telephony https://github.com/openwrt/telephony.git;$BRANCH" \
          "src-git video https://github.com/openwrt/video.git;$BRANCH" \
          > openwrt/feeds.conf.default
        cat openwrt/feeds.conf.default
        echo "::endgroup::"
        echo "::group::feeds update & install"
        cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a
        echo "::endgroup::"

    - name: 应用 DIY 配置
      run: |
        echo "::group::复制配置文件"
        cp N1/n1.config openwrt/.config
        chmod +x N1/diy-n1.sh
        echo "::endgroup::"
        echo "::group::执行 diy-n1.sh"
        cd openwrt && "$GITHUB_WORKSPACE/N1/diy-n1.sh"
        echo "::endgroup::"

    - name: 下载源码包
      working-directory: /workdir/openwrt
      run: |
        echo "::group::make defconfig"
        make defconfig
        echo "::endgroup::"
        echo "::group::make download"
        make download -j8
        find dl -size -1024c -exec rm -f {} \;
        echo "::endgroup::"

    - name: 编译固件
      id: compile
      working-directory: /workdir/openwrt
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        ccache -M 5G && ccache -z
        echo "::group::多线程编译 -j$(nproc)"
        if make -j$(nproc); then
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
        else
          echo "::endgroup::"
          echo "::warning::多线程失败，切换单线程排错..."
          echo "::group::单线程编译 V=s"
          make -j1 V=s
          echo "::endgroup::"
          echo "status=success" >> "$GITHUB_OUTPUT"
        fi

    - name: 打包 N1 固件
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "::group::整理编译产物"
        mkdir -p /workdir/upload openwrt-armvirt
        cp openwrt/bin/targets/*/*/*-generic-rootfs.tar.gz /workdir/upload/
        mv openwrt/bin/targets/*/*/*-generic-rootfs.tar.gz openwrt-armvirt/
        rm -rf /workdir/openwrt
        echo "::endgroup::"

    - name: 生成固件
      if: steps.compile.outputs.status == 'success'
      uses: unifreq/openwrt_packit@master
      env:
        WHOAMI: ham
        OPENWRT_ARMVIRT: openwrt-armvirt/*-generic-rootfs.tar.gz
        PACKAGE_SOC: s905d
        KERNEL_AUTO_LATEST: true
        KERNEL_REPO_URL: ophub/kernel
        KERNEL_USAGE: flippy
        KERNEL_VERSION_NAME: ${{ matrix.kernel }}

    - name: 上传 Artifacts
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: N1-${{ env.TAG }}
        path: /opt/openwrt_packit/output/*
        retention-days: 7
        if-no-files-found: warn

    - name: 上传 Release
      id: release
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "::group::生成 Release 描述"
        sudo chown -R "$USER:$GROUPS" /opt/openwrt_packit/output 2>/dev/null || true
        sudo mkdir -p /workdir/upload
        [ -d /opt/openwrt_packit/output ] && sudo cp /opt/openwrt_packit/output/* /workdir/upload/
        sudo chown -R "$USER:$GROUPS" /workdir/upload
        {
          echo "- **源码**: https://github.com/immortalwrt/immortalwrt/tree/$BRANCH"
          echo "- **网关**: 192.168.123.2 | **账户**: root | **密码**: password"
          echo ""
          echo "### 更新日志"
          [ -f "N1/logs.txt" ] && cat "N1/logs.txt" || echo "- 常规更新"
        } > /workdir/upload/desc.txt
        VER=${TAG//.}
        echo "tag=N1-${VER}_$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
        echo "date=$(date '+%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"
        echo "产物列表:"
        ls -lh /workdir/upload/
        echo "::endgroup::"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 发布 Release
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: "OpenWrt-N1 ${{ env.TAG }} ${{ steps.release.outputs.date }}"
        tag: ${{ steps.release.outputs.tag }}
        artifacts: /workdir/upload/openwrt*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        bodyFile: /workdir/upload/desc.txt

    - name: 清理旧记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 5
        keep_minimum_runs: 10
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 清理旧 Release
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: ${{ matrix.keep }}
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
