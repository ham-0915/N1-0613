mixed-port: 7890
log-level: error
ipv6: false
allow-lan: true

external-controller: "127.0.0.1:9090"
external-ui: ui
external-ui-url: "https://gh-proxy.org/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  mtu: 1500
  dns-hijack:
    - "udp://any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  disable-icmp-forwarding: true

# ------- DNS -------
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.market.xiaomi.com"
    - "lancache.steamcontent.com"
    - "rule-set:fakeip_filter"
    - "rule-set:private"
  default-nameserver:                     
    - https://223.6.6.6/dns-query
  proxy-server-nameserver:                  
    - https://dns.alidns.com/dns-query
  nameserver:                                
    - quic://dns.alidns.com
  nameserver-policy:
    "www.gstatic.com": ["system", "119.29.29.29"]
    "rule-set:private": ["system"]
    "rule-set:gfw": ["https://dns.google/dns-query#代理"]   

hosts:
  "dns.alidns.com": ["223.5.5.5", "223.6.6.6"]
  "dns.google": ["8.8.8.8", "8.8.4.4"]

# ------- 测速通用属性 -------
p: &p
  type: url-test
  include-all: true
  exclude-type: direct|reject
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  tolerance: 50
  timeout: 3000

proxy-groups:
  # 顶层策略组
  - name: 代理
    type: select
    proxies: [日本, 香港, 新加坡, 美国, 其它地区, 自动选择]

  - name: 自动选择
    <<: *p

  # 分应用策略组
  - name: Google
    type: select
    proxies: [代理, 香港, 日本, 新加坡, 美国, 其它地区, 自动选择]

  - name: YouTube
    type: select
    proxies: [代理, 美国, 日本, 新加坡, 其它地区, 自动选择]

  - name: NETFLIX
    type: select
    proxies: [新加坡, 代理, 香港, 日本, 美国, 其它地区, 自动选择]

  - name: AI模型
    type: select
    proxies: [美国, 代理, 日本, 新加坡, 其它地区, 自动选择]

  - name: TikTok
    type: select
    proxies: [美国, 代理, 日本, 新加坡, 其它地区, 自动选择]

  - name: 漏网之鱼
    type: select
    proxies: [代理, 自动选择, DIRECT]

  # 地区策略组
  - name: 香港
    <<: *p
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 日本
    <<: *p
    filter: "(?i)日|jp|japan"

  - name: 美国
    <<: *p
    filter: "(?i)美|us|unitedstates|united states"

  - name: 新加坡
    <<: *p
    filter: "(?i)(新|sg|singapore)"

  - name: 其它地区
    <<: *p
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"

# ------- 分流规则（从上到下，第一条命中即生效） -------
rules:
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve

  - DOMAIN-KEYWORD,6v,DIRECT
  - DOMAIN-KEYWORD,66tu,DIRECT
  - DOMAIN-KEYWORD,gh-proxy,DIRECT
  - DOMAIN-SUFFIX,appstorrent.ru,DIRECT
  - DOMAIN-SUFFIX,publicsuffix.org,DIRECT

  - RULE-SET,youtube,YouTube         
  - RULE-SET,google,Google           
  - RULE-SET,ai_domain,AI模型        
  - RULE-SET,telegram,代理
  - RULE-SET,github,代理
  - RULE-SET,twitter,代理
  - RULE-SET,netflix_domain,NETFLIX
  - RULE-SET,tiktok_domain,TikTok

  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,telegram_ip,代理,no-resolve
  - RULE-SET,twitter_ip,代理,no-resolve
  - RULE-SET,netflix_ip,NETFLIX,no-resolve

  - RULE-SET,gfw,代理
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - MATCH,漏网之鱼

# ------- 规则集公共属性锚点 -------
# proxy: DIRECT —— 所有规则集 url 均已套 gh-proxy.org 镜像，国内可直连下载
rule-anchor:
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs, proxy: DIRECT}
  ip:     &ip     {type: http, interval: 86400, behavior: ipcidr, format: mrs, proxy: DIRECT}

