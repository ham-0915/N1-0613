# =====================================================
# 基础全局配置
# =====================================================

allow-lan: true
ipv6: false
mode: rule
log-level: info
bind-address: '*'
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict
external-controller: '127.0.0.1:9090'
external-ui: ui
external-ui-url: 'https://gh-proxy.org/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'

profile:
  store-selected: true
  store-fake-ip: true

# =====================================================
# DNS 配置
# =====================================================

# 国内 / 国外 DNS 分组定义
chinaDNS: &chinaDNS
  - 'https://dns.alidns.com/dns-query#DIRECT'
  - 'https://doh.pub/dns-query#DIRECT'

foreignDNS: &foreignDNS
  - 'https://dns.cloudflare.com/dns-query#默认代理'
  - 'https://dns.google/dns-query#默认代理'

dns:
  enable: true
  ipv6: false
  use-hosts: true
  cache-algorithm: arc
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['rule-set:private', 'rule-set:fakeip_filter']
  proxy-server-nameserver: *chinaDNS
  default-nameserver: ['223.5.5.5', '119.29.29.29']
  nameserver: *foreignDNS
  nameserver-policy:
    'rule-set:cn': *chinaDNS
  direct-nameserver: ['system', '223.5.5.5', '119.29.29.29']

# 静态 hosts 解析
hosts:
  'dns.alidns.com': ['223.5.5.5', '223.6.6.6']
  'doh.pub': ['1.12.12.12', '120.53.53.53']
  'dns.cloudflare.com': ['1.1.1.1', '1.0.0.1']
  'dns.google': ['8.8.8.8', '8.8.4.4']

  # 解决谷歌商店无法下载的问题
  # 'services.googleapis.cn': ['services.googleapis.com']

  # 屏蔽哔哩哔哩 PCDN，解决访问视频卡顿问题
  '+.mcdn.bilivideo.com': ['0.0.0.0']
  '+.mcdn.bilivideo.cn': ['0.0.0.0']
  '+.edge.mountaintoys.cn': ['0.0.0.0']

ntp:
  enable: true
  write-to-system: false
  server: 'ntp.aliyun.com'
  port: 123
  interval: 60


# =====================================================
# TUN 网卡配置（透明代理网关）
# =====================================================

tun:
  enable: true
  stack: mixed  # 可选 system
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: ['any:53', 'tcp://any:53']

# =====================================================
# 直连节点
# =====================================================

proxies:
  - { name: '🇨🇳 直连 | IPv4优先', type: direct, ip-version: ipv4-prefer }
  - { name: '🇨🇳 直连 | IPv6优先', type: direct, ip-version: ipv6-prefer }
  - { name: '🇨🇳 直连 | 双栈',     type: direct }


